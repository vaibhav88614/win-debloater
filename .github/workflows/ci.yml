name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Ruff lint
        run: python -m ruff check .
      - name: Ruff format check
        run: python -m ruff format --check .
      - name: mypy (app/core)
        run: python -m mypy app/core

  test:
    name: Test (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install Qt offscreen deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0 libdbus-1-3 libfontconfig1

      - name: Run tests with coverage
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest --cov=app --cov-report=term-missing tests

      - name: GUI smoke test (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: >
          python -c "import sys; from PySide6.QtWidgets import QApplication;
          app = QApplication(sys.argv);
          from app.ui.main_window import MainWindow;
          w = MainWindow(is_elevated=False);
          assert w.menuBar() is not None;
          print('smoke ok')"

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller app.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinDebloater-windows
          path: dist/WinDebloater.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: WinDebloater-windows
          path: dist
      - name: Create release and attach executable
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WinDebloater.exe
          generate_release_notes: true
